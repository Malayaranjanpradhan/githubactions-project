name: Java CI/CD Pipeline to Tomcat

on:
  push:
    branches: [ main ]   # Trigger on push to main branch

jobs:
  build:
    runs-on: [self-hosted, linux]
    env:
      AWS_REGION: ap-south-1  # Mumbai region

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Install Maven if missing
      - name: Ensure Maven is installed
        run: |
          if ! command -v mvn &> /dev/null; then
            echo "Maven not found. Installing..."
            sudo dnf install -y maven
          else
            echo "Maven is already installed"
          fi
          mvn -version

      # 4. Cache Maven dependencies
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      # 5. Build with Maven
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 6. Upload WAR to GitHub Artifacts (For the deploy job to fetch)
      - name: Upload WAR artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: myapp
          path: target/*.war

      # 7. Archive copy in AWS S3 (Using the EC2 IAM Role automatically)
      - name: Upload WAR artifact to S3
        run: |
          echo "Archiving build artifact in S3..."
          aws s3 cp target/*.war s3://githubaction-s3-bkt/builds/myapp.war --region $AWS_REGION

      # 8. SonarQube analysis
      - name: SonarQube Analysis
        env:
          SONAR_HOST: ${{ secrets.SONAR_HOST }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "SonarQube server URL: $SONAR_HOST"
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:4.0.0.4121:sonar \
            -Dsonar.projectKey=hotstar \
            -Dsonar.host.url=$SONAR_HOST \
            -Dsonar.login=$SONAR_TOKEN

  deploy:
    runs-on: ubuntu-latest # Reverted back to standard GitHub runner
    needs: build
    environment: production

    steps:
      # 9. Download WAR artifact natively from GitHub
      - name: Download WAR artifact from GitHub
        uses: actions/download-artifact@v4
        with:
          name: myapp

      # 10. Deploy WAR via Tomcat Manager
      - name: Deploy to Tomcat
        run: |
          WAR_FILE=$(ls *.war)
          echo "Deploying $WAR_FILE to Tomcat..."
          curl -v --upload-file "$WAR_FILE" \
            "http://${{ secrets.TOMCAT_USER }}:${{ secrets.TOMCAT_PASSWORD }}@${{ secrets.TOMCAT_HOST }}/manager/text/deploy?path=/myapp&update=true"

      # 11. Verify deployment
      - name: Verify deployment
        run: |
          curl -I http://${{ secrets.TOMCAT_HOST }}/myapp

name: Java CI/CD Pipeline to Tomcat

on:
  push:
    branches: [ main ]   # Trigger on push to main branch

jobs:
  build:
    runs-on: [self-hosted, linux]
    env:
      AWS_REGION: ap-south-1  # Change this to your S3 bucket's region

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Install Maven if missing
      - name: Ensure Maven is installed
        run: |
          if ! command -v mvn &> /dev/null; then
            echo "Maven not found. Installing..."
            sudo dnf install -y maven
          else
            echo "Maven is already installed"
          fi
          mvn -version

      # 4. Cache Maven dependencies
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      # 5. Build with Maven
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 6. Upload WAR artifact to S3 (Leveraging Bucket Versioning)
      - name: Upload WAR artifact to S3
        run: |
          echo "Uploading build artifact to S3..."
          # Versioning is enabled, so we can overwrite this key and S3 will manage history automatically
          aws s3 cp target/*.war s3://githubaction-s3-bkt/builds/myapp.war --region $AWS_REGION

      # 7. SonarQube analysis
      - name: SonarQube Analysis
        env:
          SONAR_HOST: ${{ secrets.SONAR_HOST }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "SonarQube server URL: $SONAR_HOST"
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:4.0.0.4121:sonar \
            -Dsonar.projectKey=hotstar \
            -Dsonar.host.url=$SONAR_HOST \
            -Dsonar.login=$SONAR_TOKEN

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    env:
      AWS_REGION: us-east-1  # Change this to your S3 bucket's region

    steps:
      # 8. Configure AWS Credentials for the GitHub cloud runner
      - name: Configure AWS Credentials for Deploy
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 9. Download the latest version of the WAR from S3
      - name: Download Latest WAR from S3
        run: |
          echo "Downloading latest artifact from S3..."
          aws s3 cp s3://your-s3-bucket-name/builds/myapp.war myapp.war

      # 10. Deploy WAR via Tomcat Manager
      - name: Deploy to Tomcat
        run: |
          echo "Deploying myapp.war to Tomcat..."
          curl -v --upload-file "myapp.war" \
            "http://${{ secrets.TOMCAT_USER }}:${{ secrets.TOMCAT_PASSWORD }}@${{ secrets.TOMCAT_HOST }}/manager/text/deploy?path=/myapp&update=true"

      # 11. Verify deployment
      - name: Verify deployment
        run: |
          curl -I http://${{ secrets.TOMCAT_HOST }}/myapp
